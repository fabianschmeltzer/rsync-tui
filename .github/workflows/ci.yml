name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "1.26.x"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Install Linux test dependencies
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client shellcheck

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run self-test
        run: go run ./cmd/rsync-tui self-test

      - name: Check installer
        run: shellcheck install.sh

  cross-build:
    name: Linux cross-builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - name: Build supported targets
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o /tmp/rsync-tui-amd64 ./cmd/rsync-tui
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -o /tmp/rsync-tui-arm64 ./cmd/rsync-tui
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -o /tmp/rsync-tui-armv7 ./cmd/rsync-tui

  ssh-integration:
    name: OpenSSH integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - name: Configure local OpenSSH server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server rsync
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keygen -q -t ed25519 -N "" -f "$HOME/.ssh/id_ed25519"
          cat "$HOME/.ssh/id_ed25519.pub" >> "$HOME/.ssh/authorized_keys"
          chmod 600 "$HOME/.ssh/authorized_keys"
          sudo mkdir -p /run/sshd
          sudo /usr/sbin/sshd
          ssh-keyscan -H localhost >> "$HOME/.ssh/known_hosts"
      - name: Test remote browser and path validation
        env:
          SSH_TEST_HOST: runner@localhost
        run: go test -tags=ssh_integration ./internal/browser

  vulnerability-scan:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true
      - name: Scan Go dependencies
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26.x"
          go-package: ./...
